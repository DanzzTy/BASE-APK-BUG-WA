<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THE EXECUTOR - ADMIN PANEL</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#050508',
            foreground: '#e4e4e7',
          },
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Standalone custom glass styles and animations -->
  <link rel="stylesheet" href="/css/style.css">
  <meta name="theme-color" content="#050508">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
</head>
<body class="min-h-full flex flex-col bg-background text-foreground pb-8">
  <!-- Animated background mesh -->
  <div class="bg-mesh"></div>

  <!-- Main Container -->
  <div id="adminPanelContainer" class="relative z-10 w-full max-w-[430px] mx-auto min-h-[100vh] flex flex-col hidden">
    <!-- Header -->
    <header class="flex justify-between items-center px-5 pt-8 pb-4">
      <div class="flex items-center gap-3.5">
        <a href="/dashboard" class="w-10 h-10 rounded-2xl glass flex items-center justify-center hover:bg-white/5 active:scale-95 transition-all cursor-pointer text-zinc-400 hover:text-zinc-200">
          <!-- Back arrow -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <div>
          <h1 class="text-lg font-bold tracking-[0.2em] text-white font-orbitron">ADMIN PANEL</h1>
          <p class="text-[9px] tracking-[0.15em] text-indigo-400 font-bold uppercase mt-0.5">USER GATEWAY CONTROL</p>
        </div>
      </div>
      <button id="openAddUserModalButton" class="w-10 h-10 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 flex items-center justify-center hover:bg-indigo-500/20 active:scale-95 transition-all cursor-pointer">
        <!-- Plus Icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>

    <!-- Main users list -->
    <main id="usersListWrapper" class="flex-1 px-5 space-y-4 overflow-y-auto">
      <!-- Loaded dynamically via JS -->
    </main>

    <!-- Provision User Modal -->
    <div id="addUserModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden">
      <!-- Backdrop -->
      <div id="addUserModalBackdrop" class="absolute inset-0 bg-black/75 backdrop-blur-sm"></div>
      
      <!-- Modal Content Sheet -->
      <div class="relative w-full max-w-[430px] bg-[#0c0c10] border-t border-x border-zinc-800 rounded-t-3xl p-6 pb-10 anim-slide-up z-10">
        <!-- Handle bar -->
        <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-6"></div>
        <div class="text-center mb-6">
          <h3 class="text-md font-bold tracking-[0.15em] text-white font-orbitron">PROVISION USER NODE</h3>
          <p class="text-[10px] text-zinc-500 tracking-wide mt-1">Configure access credentials for target workspace</p>
        </div>

        <form id="saveUserForm" class="space-y-4 text-left">
          <div class="space-y-1.5">
            <label class="label">USERNAME</label>
            <input id="usernameInput" type="text" class="input-glass" placeholder="Enter Username" required>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1.5">
              <label class="label">STATUS / ROLE</label>
              <select id="roleSelect" class="input-glass bg-[#0c0c10] pr-8">
                <option value="User">USER</option>
                <option value="VIP">VIP</option>
                <option value="Reseller">RESELLER</option>
                <option value="Owner">OWNER</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="label">LIMIT</label>
              <input id="limitInput" type="number" class="input-glass" placeholder="Execution Limit" required>
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="label">ACTIVE UNTIL (YYYY-MM-DD)</label>
            <input id="activeUntilInput" type="text" class="input-glass font-mono" placeholder="YYYY-MM-DD" required>
          </div>

          <div class="space-y-1.5">
            <label class="label">PASSWORD</label>
            <input id="passwordInput" type="text" class="input-glass font-mono" placeholder="Enter Password" required>
          </div>

          <div class="flex gap-3 pt-2">
            <button id="cancelModalButton" type="button" class="btn-ghost flex-1">CANCEL</button>
            <button type="submit" class="btn-primary flex-1">SAVE CREDENTIALS</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastContainer" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 hidden anim-slide-up">
      <!-- Rendered dynamically -->
    </div>
  </div>

  <!-- Gateway loading state -->
  <div id="gatewayLoadingState" class="min-h-screen flex items-center justify-center bg-[#050508] text-white">
    <p class="text-xs font-bold tracking-[0.2em] font-orbitron animate-pulse">AUTHORIZING GATEWAY...</p>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[Service Worker] Registered', reg.scope))
          .catch(err => console.error('[Service Worker] Registration failed', err));
      });
    }
  </script>
</body>
  </html>
